<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">dotnet-learning-lab</a>
    <nav aria-label="Main navigation">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/learning-paths/modern-csharp-type-system/' | relative_url }}">Modern C# Type System</a>
      <a href="https://github.com/SimonGelbart/dotnet-learning-lab">GitHub</a>
      <a href="https://SimonGelbart.github.io">SimonGelbart.github.io</a>
    </nav>
  </header>

  <main class="page-shell">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© Simon Gelbart</span>
    <span>Published from Markdown in <a href="https://github.com/SimonGelbart/dotnet-learning-lab">dotnet-learning-lab</a>.</span>
  </footer>
</body>
</html>
